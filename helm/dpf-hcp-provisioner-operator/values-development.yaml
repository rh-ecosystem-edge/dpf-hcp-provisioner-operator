# Development deployment values for DPF-HCP Provisioner Operator
# Use this file for development/testing environments

# Operator image configuration
image:
  repository: quay.io/lhadad/dpf-hcp-provisioner-operator
  tag: latest
  pullPolicy: Always

# Single replica for development
replicaCount: 1

# Development namespace
namespace: dpf-hcp-provisioner-system

# Service account
serviceAccount:
  name: dpf-hcp-provisioner-operator-controller-manager
  annotations: {}

# Lower resource requirements for development
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 128Mi

# Debug logging for development
logLevel: debug

# DPFHCPProvisionerConfig CR (operator-wide configuration)
provisionerConfig: {}

# Leader election (can be disabled for single replica dev)
leaderElection:
  enabled: true

# Health probe configuration
healthProbe:
  port: 8081
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10

# Security contexts
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - "ALL"

# Run on master nodes (same as production)
nodeSelector:
  node-role.kubernetes.io/master: ""

# Tolerate master node taints
tolerations:
  - key: "node-role.kubernetes.io/master"
    operator: "Exists"
    effect: "NoSchedule"

# No affinity for dev (unlike production which spreads across zones)
affinity: {}

# Pod annotations
podAnnotations:
  kubectl.kubernetes.io/default-container: manager

# Namespace labels
namespaceLabels:
  control-plane: controller-manager
  app.kubernetes.io/name: dpf-hcp-provisioner-operator
  app.kubernetes.io/managed-by: Helm
  environment: development

# Common labels for all resources
commonLabels:
  environment: development
  team: edge-infrastructure

# Common annotations
commonAnnotations:
  managed-by: "Red Hat Edge Infrastructure Team"
  purpose: "development-testing"
