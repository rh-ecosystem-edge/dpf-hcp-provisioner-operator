apiVersion: provisioning.dpu.hcp.io/v1alpha1
kind: DPFHCPProvisionerConfig
metadata:
  name: default
  labels:
    {{- include "dpf-hcp-provisioner-operator.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  blueFieldOCPLayerRepo: {{ .Values.provisionerConfig.blueFieldOCPLayerRepo | default "quay.io/eelgaev/rhcos-bfb" | quote }}
  {{- if hasKey .Values.provisionerConfig "disableMetalLB" }}
  disableMetalLB: {{ .Values.provisionerConfig.disableMetalLB }}
  {{- end }}
  manageDPUServiceTemplates: {{ .Values.provisionerConfig.manageDPUServiceTemplates | default false }}
