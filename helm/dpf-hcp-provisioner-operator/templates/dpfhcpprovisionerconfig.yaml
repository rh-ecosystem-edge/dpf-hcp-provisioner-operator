apiVersion: provisioning.dpu.hcp.io/v1alpha1
kind: DPFHCPProvisionerConfig
metadata:
  name: default
  labels:
    {{- include "dpf-hcp-provisioner-operator.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  enableBlueFieldValidation: {{ if hasKey .Values.provisionerConfig "enableBlueFieldValidation" }}{{ .Values.provisionerConfig.enableBlueFieldValidation }}{{ else }}true{{ end }}
  blueFieldOCPRepo: {{ .Values.provisionerConfig.blueFieldOCPRepo | default "quay.io/eelgaev/rhcos-bfb" | quote }}
