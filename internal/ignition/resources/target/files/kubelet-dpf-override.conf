# Override for enforceNodeAllocatable — replaces the default kubelet config section.
apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration
enforceNodeAllocatable:
- pods
# Disabled: requires systemReservedCgroup, whose cgroup setup can interfere
# with hugetlb controller paths on DPF nodes even though -compressible only
# enforces compressible resources (CPU). See also tmpfiles-hugetlbfs-dpf.conf.
# - system-reserved-compressible
