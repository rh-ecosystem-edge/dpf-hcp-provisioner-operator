---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: dpfhcpprovisioners.provisioning.dpu.hcp.io
spec:
  group: provisioning.dpu.hcp.io
  names:
    kind: DPFHCPProvisioner
    listKind: DPFHCPProvisionerList
    plural: dpfhcpprovisioners
    shortNames:
    - dpfhcp
    singular: dpfhcpprovisioner
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.hostedClusterRef.name
      name: HostedCluster
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: DPFHCPProvisioner is the Schema for the dpfhcpprovisioners API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DPFHCPProvisionerSpec defines the desired state of DPFHCPProvisioner
            properties:
              baseDomain:
                description: |-
                  BaseDomain is the base domain for the hosted cluster's DNS records
                  Example: clusters.example.com results in API endpoint at api.prod-cluster.clusters.example.com
                  This field is immutable.
                maxLength: 253
                minLength: 4
                pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?\.)+[a-z]{2,}$
                type: string
                x-kubernetes-validations:
                - message: baseDomain is immutable
                  rule: self == oldSelf
              controlPlaneAvailabilityPolicy:
                allOf:
                - enum:
                  - HighlyAvailable
                  - SingleReplica
                - enum:
                  - SingleReplica
                  - HighlyAvailable
                default: HighlyAvailable
                description: |-
                  ControlPlaneAvailabilityPolicy specifies the availability policy for the control plane
                  Valid values: SingleReplica, HighlyAvailable
                  This field is immutable.
                type: string
                x-kubernetes-validations:
                - message: controlPlaneAvailabilityPolicy is immutable
                  rule: self == oldSelf
              disabledCapabilities:
                description: |-
                  DisabledCapabilities is a list of optional cluster capabilities to disable on the hosted cluster.
                  When not specified, the following capabilities are disabled by default to reduce resource
                  consumption in DPU environments: ImageRegistry, Insights, Console, openshift-samples, Ingress, NodeTuning.
                  Set to an empty list to disable no capabilities.
                  Valid values: ImageRegistry, openshift-samples, Insights, Console, NodeTuning, Ingress.
                  Note: Ingress can only be disabled if Console is also disabled.
                  This field is immutable.
                items:
                  enum:
                  - ImageRegistry
                  - openshift-samples
                  - Insights
                  - baremetal
                  - Console
                  - NodeTuning
                  - Ingress
                  type: string
                maxItems: 6
                type: array
                x-kubernetes-list-type: set
                x-kubernetes-validations:
                - message: disabledCapabilities is immutable
                  rule: self == oldSelf
                - message: 'disabledCapabilities contains an invalid capability. Valid
                    values are: ImageRegistry, openshift-samples, Insights, Console,
                    NodeTuning, Ingress'
                  rule: self.all(cap, cap in ['ImageRegistry', 'openshift-samples',
                    'Insights', 'Console', 'NodeTuning', 'Ingress'])
              dpuClusterRef:
                description: |-
                  DPUClusterRef is a cross-namespace reference to a DPUCluster CR for validation and kubeconfig injection
                  This field is immutable.
                properties:
                  name:
                    description: Name is the name of the DPUCluster CR
                    type: string
                  namespace:
                    description: Namespace is the namespace of the DPUCluster CR
                    type: string
                required:
                - name
                - namespace
                type: object
                x-kubernetes-validations:
                - message: dpuClusterRef is immutable
                  rule: self == oldSelf
              etcdStorageClass:
                description: |-
                  EtcdStorageClass is the storage class name for etcd persistent volumes in the hosted cluster control plane
                  This field is immutable.
                type: string
                x-kubernetes-validations:
                - message: etcdStorageClass is immutable
                  rule: self == oldSelf
              flannelEnabled:
                default: true
                description: |-
                  FlannelEnabled indicates whether Flannel should be used as the CNI plugin for the hosted cluster.
                  When set to true, the HostedCluster will be configured with NetworkType "Other" and
                  AllocateNodeCIDRs set to "Enabled", which allows kube-controller-manager to manage node CIDR
                  allocation as required by Flannel.
                  This field is immutable.
                type: boolean
                x-kubernetes-validations:
                - message: flannelEnabled is immutable
                  rule: self == oldSelf
              networking:
                description: |-
                  Networking defines the network CIDR configuration for the hosted cluster.
                  When not specified, defaults are used: ServiceNetwork 172.31.0.0/16,
                  ClusterNetwork 10.132.0.0/14, MachineNetwork empty.
                  NetworkType is always set to "Other" for DPU environments.
                  This field is immutable.
                properties:
                  clusterNetwork:
                    description: |-
                      ClusterNetwork is the list of IP address pools for pods.
                      Defaults to a single entry with CIDR 10.132.0.0/14.
                      Currently only one entry is supported.
                    items:
                      description: |-
                        ClusterNetworkEntry is a single IP address block for pod IP blocks. IP blocks
                        are allocated with size 2^HostSubnetLength.
                      properties:
                        cidr:
                          description: cidr is the IP block address pool.
                          maxLength: 43
                          type: string
                          x-kubernetes-validations:
                          - message: cidr must be a valid IPv4 or IPv6 CIDR notation
                              (e.g., 192.168.1.0/24 or 2001:db8::/64)
                            rule: self.matches('^((\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2})$')
                              || self.matches('^([0-9a-fA-F]{0,4}:){2,7}([0-9a-fA-F]{0,4})?/[0-9]{1,3}$')
                        hostPrefix:
                          description: |-
                            hostPrefix is the prefix size to allocate to each node from the CIDR.
                            For example, 24 would allocate 2^(32-24)=2^8=256 addresses to each node. If this
                            field is not used by the plugin, it can be left unset.
                          format: int32
                          type: integer
                      required:
                      - cidr
                      type: object
                    maxItems: 1
                    type: array
                  machineNetwork:
                    description: |-
                      MachineNetwork is the list of IP address pools for machines/nodes.
                      Defaults to empty (no machine network CIDR).
                    items:
                      description: MachineNetworkEntry is a single IP address block
                        for node IP blocks.
                      properties:
                        cidr:
                          description: cidr is the IP block address pool for machines
                            within the cluster.
                          maxLength: 43
                          type: string
                          x-kubernetes-validations:
                          - message: cidr must be a valid IPv4 or IPv6 CIDR notation
                              (e.g., 192.168.1.0/24 or 2001:db8::/64)
                            rule: self.matches('^((\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2})$')
                              || self.matches('^([0-9a-fA-F]{0,4}:){2,7}([0-9a-fA-F]{0,4})?/[0-9]{1,3}$')
                      required:
                      - cidr
                      type: object
                    maxItems: 1
                    type: array
                  serviceNetwork:
                    description: |-
                      ServiceNetwork is the list of IP address pools for services.
                      Defaults to a single entry with CIDR 172.31.0.0/16.
                      Currently only one entry is supported.
                    items:
                      description: ServiceNetworkEntry is a single IP address block
                        for the service network.
                      properties:
                        cidr:
                          description: cidr is the IP block address pool for services
                            within the cluster in CIDR format (e.g., 192.168.1.0/24
                            or 2001:0db8::/64)
                          maxLength: 43
                          type: string
                          x-kubernetes-validations:
                          - message: cidr must be a valid IPv4 or IPv6 CIDR notation
                              (e.g., 192.168.1.0/24 or 2001:db8::/64)
                            rule: self.matches('^((\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2})$')
                              || self.matches('^([0-9a-fA-F]{0,4}:){2,7}([0-9a-fA-F]{0,4})?/[0-9]{1,3}$')
                      required:
                      - cidr
                      type: object
                    maxItems: 1
                    type: array
                type: object
                x-kubernetes-validations:
                - message: networking is immutable
                  rule: self == oldSelf
              nodeSelector:
                additionalProperties:
                  type: string
                description: |-
                  NodeSelector defines the node selector for the hosted control plane pods
                  It specifies which nodes in the management cluster can host the control plane workloads
                  Default: {"node-role.kubernetes.io/control-plane": ""} (schedules on control-plane nodes)
                  This field is immutable.
                type: object
                x-kubernetes-validations:
                - message: nodeSelector is immutable
                  rule: self == oldSelf
                - message: nodeSelector map can have at most 20 entries
                  rule: size(self) <= 20
              ocpReleaseImage:
                description: |-
                  OCPReleaseImage is the full pull-spec URL for the OCP release image
                  The operator uses this to look up the corresponding BlueField container image from the central ConfigMap
                type: string
              pullSecretRef:
                description: |-
                  PullSecretRef is a reference to a Secret containing the container registry pull secret
                  Secret must be in the same namespace as the DPFHCPProvisioner CR and contain key '.dockerconfigjson'
                  This field is immutable.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
                x-kubernetes-validations:
                - message: pullSecretRef is immutable
                  rule: self == oldSelf
              sshKeySecretRef:
                description: |-
                  SSHKeySecretRef is a reference to a Secret containing the SSH public key for cluster node access
                  Secret must be in the same namespace as the DPFHCPProvisioner CR and contain key 'id_rsa.pub'
                  This field is immutable.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
                x-kubernetes-validations:
                - message: sshKeySecretRef is immutable
                  rule: self == oldSelf
              virtualIP:
                description: |-
                  VirtualIP is the virtual IP address for load balancer
                  Required when ControlPlaneAvailabilityPolicy is HighlyAvailable
                  Must be a routable IP in the management cluster network
                  This field is immutable.
                type: string
                x-kubernetes-validations:
                - message: virtualIP is immutable
                  rule: self == oldSelf
                - message: virtualIP must be a valid IP address
                  rule: self == '' || isIP(self)
            required:
            - baseDomain
            - dpuClusterRef
            - ocpReleaseImage
            - pullSecretRef
            - sshKeySecretRef
            type: object
            x-kubernetes-validations:
            - message: virtualIP is required when controlPlaneAvailabilityPolicy is
                HighlyAvailable
              rule: self.controlPlaneAvailabilityPolicy != 'HighlyAvailable' || (has(self.virtualIP)
                && size(self.virtualIP) > 0)
          status:
            description: DPFHCPProvisionerStatus defines the observed state of DPFHCPProvisioner
            properties:
              blueFieldContainerImage:
                description: BlueFieldContainerImage is the resolved BlueField container
                  image URL
                type: string
              conditions:
                description: Conditions represent the latest available observations
                  of the DPFHCPProvisioner's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              hostedClusterRef:
                description: HostedClusterRef is a reference to the created HostedCluster
                  CR
                properties:
                  apiVersion:
                    description: API version of the referent.
                    type: string
                  fieldPath:
                    description: |-
                      If referring to a piece of an object instead of an entire object, this string
                      should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                      For example, if the object reference is to a container within a pod, this would take on a value like:
                      "spec.containers{name}" (where "name" refers to the name of the container that triggered
                      the event) or if no container name is specified "spec.containers[2]" (container with
                      index 2 in this pod). This syntax is chosen only to have some well-defined way of
                      referencing a part of an object.
                    type: string
                  kind:
                    description: |-
                      Kind of the referent.
                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                    type: string
                  name:
                    description: |-
                      Name of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                  namespace:
                    description: |-
                      Namespace of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                    type: string
                  resourceVersion:
                    description: |-
                      Specific resourceVersion to which this reference is made, if any.
                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                    type: string
                  uid:
                    description: |-
                      UID of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              kubeConfigSecretRef:
                description: KubeConfigSecretRef is a reference to the created kubeconfig
                  Secret in the DPUCluster's namespace
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              phase:
                description: Phase represents the current lifecycle phase
                enum:
                - Pending
                - Provisioning
                - Ready
                - Failed
                - Deleting
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
