apiVersion: provisioning.dpu.hcp.io/v1alpha1
kind: DPFHCPProvisioner
metadata:
  labels:
    app.kubernetes.io/name: dpf-hcp-provisioner-operator
    app.kubernetes.io/managed-by: kustomize
  name: dpfhcpprovisioner-sample
  namespace: dpf-hcp-provisioner-system
spec:
  # Reference to DPUCluster (can be in different namespace)
  dpuClusterRef:
    name: dpu-cluster-sample
    namespace: dpf-operator-system

  # Base domain for hosted cluster DNS
  baseDomain: clusters.example.com

  # OCP release image
  ocpReleaseImage: quay.io/openshift-release-dev/ocp-release:4.19.0-ec.5-multi

  # SSH key secret reference (same namespace as DPFHCPProvisioner)
  sshKeySecretRef:
    name: prod-ssh-key

  # Pull secret reference (same namespace as DPFHCPProvisioner)
  pullSecretRef:
    name: prod-pull-secret

  # Storage class for etcd (optional)
  etcdStorageClass: ceph-rbd-retain

  # Control plane availability policy - HighlyAvailable for production
  # When HighlyAvailable, virtualIP is required
  # When SingleReplica, virtualIP is optional
  controlPlaneAvailabilityPolicy: HighlyAvailable

  # Virtual IP for LoadBalancer service exposure
  # Required when controlPlaneAvailabilityPolicy is HighlyAvailable
  # Optional when controlPlaneAvailabilityPolicy is SingleReplica
  # If provided with SingleReplica, services will be exposed via LoadBalancer
  # If not provided with SingleReplica, services will be exposed via NodePort
  virtualIP: 192.168.1.100

  # Networking configuration (optional)
  # When not specified, defaults are used:
  #   ServiceNetwork: 172.31.0.0/16, ClusterNetwork: 10.132.0.0/14, MachineNetwork: empty
  # NetworkType is always "Other" for DPU environments.
  # This field is immutable.
  # networking:
  #   serviceNetwork:
  #     - cidr: 10.96.0.0/12
  #   clusterNetwork:
  #     - cidr: 10.244.0.0/16
  #   machineNetwork:
  #     - cidr: 192.168.0.0/24

  # Disabled capabilities (optional)
  # When not specified, the following are disabled by default:
  # ImageRegistry, Insights, Console, openshift-samples, Ingress, NodeTuning
  # Uncomment and customize to override the defaults:
  # disabledCapabilities:
  #   - ImageRegistry
  #   - Insights
  #   - Console
  #   - openshift-samples
  #   - Ingress
  #   - NodeTuning
  # Set to an empty list to disable no capabilities:
  # disabledCapabilities: []
